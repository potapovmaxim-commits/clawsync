<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawSync - Task Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f3f4f6; min-height: 100vh; }
        .header { background: white; border-bottom: 1px solid #e5e7eb; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 0.5rem; font-size: 1.25rem; font-weight: 700; }
        .logo-icon { width: 32px; height: 32px; background: #3b82f6; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; }
        .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; padding: 2rem; max-width: 1400px; margin: 0 auto; }
        .column { background: #f9fafb; border-radius: 12px; padding: 1rem; min-height: 500px; }
        .column-header { font-weight: 600; color: #374151; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; }
        .task-count { background: #e5e7eb; padding: 0.125rem 0.5rem; border-radius: 999px; font-size: 0.75rem; }
        .task { background: white; border: 1px solid #e5e7eb; border-radius: 8px; padding: 0.875rem; margin-bottom: 0.75rem; cursor: grab; transition: box-shadow 0.2s; }
        .task:hover { box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .task-title { font-weight: 500; color: #111827; margin-bottom: 0.5rem; font-size: 0.875rem; }
        .task-meta { display: flex; gap: 0.5rem; align-items: center; }
        .priority { font-size: 0.625rem; padding: 0.125rem 0.5rem; border-radius: 999px; font-weight: 600; text-transform: uppercase; }
        .priority-high { background: #fee2e2; color: #dc2626; }
        .priority-medium { background: #dbeafe; color: #2563eb; }
        .priority-low { background: #d1fae5; color: #059669; }
        .add-task-btn { width: 100%; padding: 0.5rem; border: 2px dashed #d1d5db; border-radius: 8px; background: transparent; color: #6b7280; cursor: pointer; font-size: 0.875rem; transition: all 0.2s; }
        .add-task-btn:hover { border-color: #3b82f6; color: #3b82f6; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 100; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 1.5rem; border-radius: 12px; width: 90%; max-width: 480px; }
        .modal-title { font-size: 1.125rem; font-weight: 600; margin-bottom: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 0.25rem; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.875rem; }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .btn-group { display: flex; gap: 0.5rem; justify-content: flex-end; }
        .btn { padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.875rem; font-weight: 500; cursor: pointer; border: none; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-secondary { background: #e5e7eb; color: #374151; }
        .btn-danger { background: #ef4444; color: white; }
        .task-actions { display: none; margin-top: 0.5rem; gap: 0.25rem; }
        .task:hover .task-actions { display: flex; }
        .task-action-btn { padding: 0.25rem 0.5rem; font-size: 0.625rem; border: none; border-radius: 4px; cursor: pointer; }
        .supabase-info { background: #eff6ff; border: 1px solid #3b82f6; padding: 1rem; border-radius: 8px; margin: 1rem 2rem; font-size: 0.875rem; color: #1e40af; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <div class="logo-icon">C</div>
            ClawSync
        </div>
        <div>
            <span id="storage-mode" style="font-size: 0.75rem; color: #6b7280;">💾 Local Storage</span>
        </div>
    </header>

    <div class="supabase-info">
        <strong>Supabase verbunden:</strong> rihfsmtcxvpxdhqrjbor.supabase.co<br>
        <small>Wechsle zu Supabase-Modus wenn die Tabelle existiert</small>
        <button onclick="toggleStorage()" class="btn btn-primary" style="margin-top: 0.5rem;">Zu Supabase wechseln</button>
    </div>

    <div class="board">
        <div class="column" data-status="TODO">
            <div class="column-header">
                Zu tun
                <span class="task-count" id="count-TODO">0</span>
            </div>
            <div class="tasks" id="col-TODO"></div>
            <button class="add-task-btn" onclick="openModal('TODO')">+ Task hinzufügen</button>
        </div>

        <div class="column" data-status="IN_PROGRESS">
            <div class="column-header">
                In Arbeit
                <span class="task-count" id="count-IN_PROGRESS">0</span>
            </div>
            <div class="tasks" id="col-IN_PROGRESS"></div>
            <button class="add-task-btn" onclick="openModal('IN_PROGRESS')">+ Task hinzufügen</button>
        </div>

        <div class="column" data-status="IN_REVIEW">
            <div class="column-header">
                Review
                <span class="task-count" id="count-IN_REVIEW">0</span>
            </div>
            <div class="tasks" id="col-IN_REVIEW"></div>
            <button class="add-task-btn" onclick="openModal('IN_REVIEW')">+ Task hinzufügen</button>
        </div>

        <div class="column" data-status="DONE">
            <div class="column-header">
                Erledigt
                <span class="task-count" id="count-DONE">0</span>
            </div>
            <div class="tasks" id="col-DONE"></div>
            <button class="add-task-btn" onclick="openModal('DONE')">+ Task hinzufügen</button>
        </div>
    </div>

    <div class="modal" id="taskModal">
        <div class="modal-content">
            <h3 class="modal-title" id="modalTitle">Neue Task</h3>
            <input type="hidden" id="taskId">
            <input type="hidden" id="taskStatus" value="TODO">
            
            <div class="form-group">
                <label>Titel</label>
                <input type="text" id="taskTitle" placeholder="Was muss erledigt werden?">
            </div>
            
            <div class="form-group">
                <label>Beschreibung</label>
                <textarea id="taskDesc" placeholder="Details..."></textarea>
            </div>
            
            <div class="form-group">
                <label>Priorität</label>
                <select id="taskPriority">
                    <option value="LOW">Niedrig</option>
                    <option value="MEDIUM" selected>Mittel</option>
                    <option value="HIGH">Hoch</option>
                    <option value="URGENT">Dringend</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Status</label>
                <select id="taskStatusSelect">
                    <option value="TODO">Zu tun</option>
                    <option value="IN_PROGRESS">In Arbeit</option>
                    <option value="IN_REVIEW">Review</option>
                    <option value="DONE">Erledigt</option>
                </select>
            </div>
            
            <div class="btn-group">
                <button class="btn btn-danger" id="deleteBtn" onclick="deleteTask()" style="display:none;">Löschen</button>
                <button class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
                <button class="btn btn-primary" onclick="saveTask()">Speichern</button>
            </div>
        </div>
    </div>

    <script>
        // Supabase config
        const SUPABASE_URL = 'https://rihfsmtcxvpxdhqrjbor.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_s2El1DZoOlcCGuqp6ju30Q_bOoxioim';
        
        let useSupabase = false;
        let tasks = [];
        
        // Load tasks
        async function loadTasks() {
            if (useSupabase) {
                try {
                    const res = await fetch(`${SUPABASE_URL}/rest/v1/tasks?select=*`, {
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                    });
                    if (res.ok) tasks = await res.json();
                } catch(e) { console.error('Supabase error:', e); }
            } else {
                tasks = JSON.parse(localStorage.getItem('clawsync_tasks') || '[]');
            }
            renderBoard();
        }
        
        // Save task
        async function saveTask() {
            const id = document.getElementById('taskId').value;
            const task = {
                id: id || Date.now().toString(),
                title: document.getElementById('taskTitle').value,
                description: document.getElementById('taskDesc').value,
                priority: document.getElementById('taskPriority').value,
                status: document.getElementById('taskStatusSelect').value,
                created_at: new Date().toISOString()
            };
            
            if (!task.title) { alert('Titel eingeben!'); return; }
            
            if (useSupabase) {
                const method = id ? 'PATCH' : 'POST';
                const url = id ? `${SUPABASE_URL}/rest/v1/tasks?id=eq.${id}` : `${SUPABASE_URL}/rest/v1/tasks`;
                await fetch(url, {
                    method,
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
                    body: JSON.stringify(task)
                });
            } else {
                if (id) {
                    const idx = tasks.findIndex(t => t.id === id);
                    if (idx >= 0) tasks[idx] = task;
                } else {
                    tasks.push(task);
                }
                localStorage.setItem('clawsync_tasks', JSON.stringify(tasks));
            }
            
            closeModal();
            loadTasks();
        }
        
        // Delete task
        async function deleteTask() {
            const id = document.getElementById('taskId').value;
            if (!confirm('Wirklich löschen?')) return;
            
            if (useSupabase) {
                await fetch(`${SUPABASE_URL}/rest/v1/tasks?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
            } else {
                tasks = tasks.filter(t => t.id !== id);
                localStorage.setItem('clawsync_tasks', JSON.stringify(tasks));
            }
            
            closeModal();
            loadTasks();
        }
        
        // Render board
        function renderBoard() {
            ['TODO', 'IN_PROGRESS', 'IN_REVIEW', 'DONE'].forEach(status => {
                const col = document.getElementById(`col-${status}`);
                const statusTasks = tasks.filter(t => t.status === status);
                document.getElementById(`count-${status}`).textContent = statusTasks.length;
                
                col.innerHTML = statusTasks.map(task => `
                    <div class="task" draggable="true" data-id="${task.id}" ondragstart="drag(event)" onclick="editTask('${task.id}')">
                        <div class="task-title">${escapeHtml(task.title)}</div>
                        ${task.description ? `<div style="font-size: 0.75rem; color: #6b7280; margin-bottom: 0.5rem;">${escapeHtml(task.description.substring(0, 60))}${task.description.length > 60 ? '...' : ''}</div>` : ''}
                        <div class="task-meta">
                            <span class="priority priority-${task.priority.toLowerCase()}">${task.priority}</span>
                        </div>
                        <div class="task-actions">
                            <button class="task-action-btn" style="background: #dbeafe; color: #1e40af;" onclick="event.stopPropagation(); moveTask('${task.id}', '${getNextStatus(status)}')">→</button>
                            <button class="task-action-btn" style="background: #fee2e2; color: #dc2626;" onclick="event.stopPropagation(); quickDelete('${task.id}')">🗑</button>
                        </div>
                    </div>
                `).join('');
            });
        }
        
        function getNextStatus(status) {
            const flow = {TODO: 'IN_PROGRESS', IN_PROGRESS: 'IN_REVIEW', IN_REVIEW: 'DONE', DONE: 'TODO'};
            return flow[status];
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Modal
        function openModal(status, taskId = null) {
            document.getElementById('taskModal').classList.add('active');
            document.getElementById('modalTitle').textContent = taskId ? 'Task bearbeiten' : 'Neue Task';
            document.getElementById('deleteBtn').style.display = taskId ? 'block' : 'none';
            
            if (taskId) {
                const task = tasks.find(t => t.id === taskId);
                document.getElementById('taskId').value = task.id;
                document.getElementById('taskTitle').value = task.title;
                document.getElementById('taskDesc').value = task.description || '';
                document.getElementById('taskPriority').value = task.priority;
                document.getElementById('taskStatusSelect').value = task.status;
            } else {
                document.getElementById('taskId').value = '';
                document.getElementById('taskTitle').value = '';
                document.getElementById('taskDesc').value = '';
                document.getElementById('taskPriority').value = 'MEDIUM';
                document.getElementById('taskStatusSelect').value = status;
            }
        }
        
        function closeModal() {
            document.getElementById('taskModal').classList.remove('active');
        }
        
        function editTask(id) { openModal(null, id); }
        
        async function moveTask(id, newStatus) {
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.status = newStatus;
                if (useSupabase) {
                    await fetch(`${SUPABASE_URL}/rest/v1/tasks?id=eq.${id}`, {
                        method: 'PATCH',
                        headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: newStatus })
                    });
                } else {
                    localStorage.setItem('clawsync_tasks', JSON.stringify(tasks));
                }
                renderBoard();
            }
        }
        
        async function quickDelete(id) {
            if (!confirm('Löschen?')) return;
            if (useSupabase) {
                await fetch(`${SUPABASE_URL}/rest/v1/tasks?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
                });
            } else {
                tasks = tasks.filter(t => t.id !== id);
                localStorage.setItem('clawsync_tasks', JSON.stringify(tasks));
            }
            renderBoard();
        }
        
        function toggleStorage() {
            useSupabase = !useSupabase;
            document.getElementById('storage-mode').textContent = useSupabase ? '☁️ Supabase' : '💾 Local Storage';
            loadTasks();
        }
        
        // Drag and Drop
        function drag(ev) { ev.dataTransfer.setData('taskId', ev.target.dataset.id); }
        
        document.querySelectorAll('.column').forEach(col => {
            col.addEventListener('dragover', e => e.preventDefault());
            col.addEventListener('drop', async e => {
                e.preventDefault();
                const taskId = e.dataTransfer.getData('taskId');
                const newStatus = col.dataset.status;
                await moveTask(taskId, newStatus);
            });
        });
        
        // Init
        loadTasks();
    </script>
</body>
</html>
